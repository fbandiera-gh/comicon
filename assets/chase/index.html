<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chase | Profilo</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../images/leaf.svg">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Palette di Chase (Red Gothic) -->
    <link rel="stylesheet" href="../palettes/chase.css">

    <style>
        @view-transition {
            navigation: auto;
        }

        /* Definizione dell'animazione di entrata */
        @keyframes slideFadeUp {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        * { box-sizing: border-box; }

        :root {
            /* Colori personalizzati per il look più scuro di Chase */
            --darker-red: #660000;
            --deep-blood: #4a0000;
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color); 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* --- BACKGROUND PATTERN ROSE --- */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            background-image: url('../images/rose.svg');
            background-size: 100px 100px;
            background-repeat: repeat;
            filter: invert(1) brightness(0.15) sepia(1) hue-rotate(-50deg) opacity(0.3);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
            z-index: 1;
        }

        /* Applichiamo l'animazione base a tutti i figli diretti del container */
        .container > * {
            opacity: 0;
            animation: slideFadeUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* --- DELAY PER EFFETTO A CASCATA --- */
        .back-btn { animation-delay: 0.1s; }
        .profile-header { animation-delay: 0.2s; }
        .links-container { animation-delay: 0.3s; }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 800;
            background: var(--card-bg);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            border: 3px solid var(--deep-blood);
            width: fit-content;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* AVATAR CON SPINE */
        .avatar-wrapper {
            position: relative;
            padding: 10px;
            margin-bottom: 1rem;
        }

        .thorns-border {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            color: #000;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 40px;
            box-shadow: 0 0 0 6px #000;
            background: #000;
            overflow: hidden;
            transform: rotate(-3deg);
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease;
        }
        
        .avatar:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .avatar img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 34px;
            display: block;
        }

        .name {
            font-size: 2.5rem;
            font-weight: 900;
            margin: 0.5rem 0 0;
            color: #fff;
            text-shadow: 
                -2px -2px 0 #000,  
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000;
        }

        .username {
            color: var(--accent-color);
            font-weight: 800;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .npc-quote {
            position: relative;
            background: var(--card-bg);
            border: 3px solid var(--deep-blood);
            padding: 1.2rem;
            border-radius: 20px;
            margin-top: 1rem;
            font-weight: 700;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            width: 100%;
            font-size: 1.05rem;
        }

        .npc-quote::before {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 14px 14px 14px;
            border-style: solid;
            border-color: transparent transparent var(--deep-blood) transparent;
        }

        .npc-quote::after {
            content: '';
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 10px 10px 10px;
            border-style: solid;
            border-color: transparent transparent var(--card-bg) transparent;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-bg);
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            border: 3px solid var(--deep-blood);
            text-decoration: none;
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent-color);
            background-color: rgba(74, 0, 0, 0.05);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .link-card svg {
            color: var(--darker-red);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Elemento 1: Pulsante Indietro -->
        <a href="../../index.html" class="back-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            Mappa
        </a>

        <!-- Elemento 2: Header Profilo -->
        <header class="profile-header">
            <div class="avatar-wrapper">
                <svg class="thorns-border" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M40 30 L25 15 L35 35 Z" fill="currentColor"/>
                    <path d="M120 30 L135 15 L125 35 Z" fill="currentColor"/>
                    <path d="M40 130 L25 145 L35 125 Z" fill="currentColor"/>
                    <path d="M120 130 L135 145 L125 125 Z" fill="currentColor"/>
                    <path d="M25 80 L5 85 L25 95 Z" fill="currentColor"/>
                    <path d="M135 80 L155 75 L135 70 Z" fill="currentColor"/>
                    <path d="M80 25 L85 5 L75 25 Z" fill="currentColor"/>
                    <path d="M80 135 L75 155 L85 135 Z" fill="currentColor"/>
                </svg>
                
                <div class="avatar">
                    <img src="../images/chase.jpg" alt="Chase" onerror="this.outerHTML='?'">
                </div>
            </div>

            <h1 class="name">Chase</h1>
            <p class="username">@cha_cosplay</p>
            <div class="npc-quote">
                "She/he/they, 21  
                <br> 𝐀𝐧𝐝 𝐈 𝐤𝐧𝐨𝐰 𝐰𝐡𝐞𝐫𝐞 𝐭𝐨 𝐥𝐨𝐨𝐤!~"
            </div>
        </header>

        <!-- Elemento 3: Lista Link -->
        <nav class="links-container">
            <a href="https://instagram.com/cha_cosplay" class="link-card" target="_blank">
                <div class="link-content">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="6" ry="6"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                    <span>Instagram</span>
                </div>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
            </a>
        </nav>
    </div>
</body>
</html>
