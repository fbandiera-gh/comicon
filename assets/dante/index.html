<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <!-- 1. CAMBIA IL Dante QUI -->
    <title>Dante</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="../images/leaf.svg">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap" rel="stylesheet">
    
    <!-- ========================================== -->
    <!-- 2. INSERISCI QUI LA PALETTE DEL PERSONAGGIO -->
    <!-- Scegli tra: dante.css, frisk.css, erin.css, milo.css -->
    <link rel="stylesheet" href="../palettes/Dante.css">
    <!-- ========================================== -->

    <style>
        /* Regola per View Transitions API (cross-fade nativo tra le pagine) */
        @view-transition {
            navigation: auto;
        }

        /* Animazione di entrata morbida a cascata */
        @keyframes slideFadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Nunito', sans-serif;
            color: var(--text-main);
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--dot-color) 15%, transparent 15%),
                radial-gradient(var(--dot-color) 15%, transparent 15%);
            background-position: 0 0, 20px 20px;
            background-size: 40px 40px;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Applica l'animazione agli elementi principali in modo progressivo */
        .container > * {
            opacity: 0;
            animation: slideFadeUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .back-btn { animation-delay: 0.1s; }
        .profile-header { animation-delay: 0.2s; }
        .links-container { animation-delay: 0.3s; }

        /* Pulsante "Indietro" */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-muted);
            font-weight: 800;
            font-size: 1.1rem;
            background: var(--card-bg);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            border: 3px solid var(--border-color);
            width: fit-content;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            transform: translateY(-4px);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Sezione Profilo / Header */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .avatar-container {
            position: relative;
            margin-bottom: 1rem;
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 35px;
            /* Usiamo il colore di sfondo della card per il bordo, così si adatta a sfondi scuri/chiari */
            border: 6px solid var(--card-bg); 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            /* Applichiamo il gradiente personalizzato! */
            background: var(--accent-gradient, var(--accent-color));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 900;
            color: var(--card-bg);
            overflow: hidden;
            transform: rotate(-3deg);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .avatar:hover {
            transform: rotate(0deg) scale(1.05);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Badge finto per icona carina */
        .badge {
            position: absolute;
            bottom: -5px;
            right: -5px;
            background: #FFD275;
            color: #7A5C43; /* Colore fisso per contrasto sul giallo */
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 4px solid var(--card-bg);
            box-shadow: var(--shadow-sm);
            transform: rotate(15deg);
        }

        .name {
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            letter-spacing: -0.5px;
            /* Ombra dinamica per light/dark mode */
            text-shadow: 2px 2px 0px var(--text-shadow-color);
        }

        .username {
            font-size: 1.1rem;
            color: var(--text-muted);
            font-weight: 700;
            margin: 0.2rem 0 0 0;
        }

        /* Fumetto NPC per la Bio */
        .npc-quote {
            position: relative;
            background: var(--card-bg);
            border: 3px solid var(--border-color);
            padding: 1.2rem;
            border-radius: 20px;
            margin-top: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
            width: 100%;
            font-size: 1.05rem;
            line-height: 1.5;
        }

        .npc-quote::before {
            content: '';
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 14px 14px 14px;
            border-style: solid;
            border-color: transparent transparent var(--border-color) transparent;
        }

        .npc-quote::after {
            content: '';
            position: absolute;
            top: -9px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 10px 10px 10px;
            border-style: solid;
            border-color: transparent transparent var(--card-bg) transparent;
        }

        /* Link Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            background: var(--card-bg);
            padding: 1.2rem 1.5rem;
            border-radius: 20px;
            border: 3px solid var(--border-color);
            text-decoration: none;
            color: var(--text-main);
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--accent-color);
            box-shadow: var(--shadow-md);
        }

        /* Sfondo colorato in hover basato sul gradiente! */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--accent-gradient, var(--accent-color));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .link-card:hover::before {
            opacity: 0.15;
        }

        .link-icon {
            font-size: 1.8rem;
            z-index: 2;
        }

        .link-text {
            flex: 1;
            z-index: 2;
        }

        .link-arrow {
            color: var(--text-muted);
            font-weight: 900;
            z-index: 2;
            transition: transform 0.2s ease;
        }

        .link-card:hover .link-arrow {
            transform: translateX(4px);
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container">
        
        <a href="../../index.html" class="back-btn">
            <span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
            </span> Mappa
        </a>

        <!-- Profilo dell'abitante -->
        <header class="profile-header">
            <div class="avatar-container">
                <div class="avatar">
                    <!-- 3. INSERISCI QUI IL Dante DEL FILE IMMAGINE -->
                    <img src="../images/dante.jpeg" alt="Profile" onerror="this.outerHTML='?'">
                </div>
                <!-- 4. BADGE CON SCINTILLA CUSTOM IN SVG -->
                <div class="badge">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 2C12 2 12 10 20 12C12 14 12 22 12 22C12 22 12 14 4 12C12 10 12 2 12 2Z"/></svg>
                </div>
            </div>
            
            <!-- 5. DATI DEL PERSONAGGIO -->
            <h1 class="name">Dante</h1>
            <p class="username">@moonshije.cos_</p>

            <div class="npc-quote">
                "Se il masichismo, il cannibalismo accidentale e la procrastinazione avessere un figlio. <br> Se chiedi scherzo (forse...?)"
            </div>
        </header>

        <!-- Sezione Link -->
        <nav class="links-container">
            
            <!-- 6. LINK SOCIAL -->
            <a href="https://instagram.com/moonshije.cos_" target="_blank" rel="noopener noreferrer" class="link-card">
                <span class="link-icon">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="6" ry="6"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>
                </span>
                <span class="link-text">Instagram</span>
                <span class="link-arrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </span>
            </a>

            <!-- Aggiungi altri blocchi <a> uguali per aggiungere bottoni! -->

        </nav>
    </div>
</body>
</html>
